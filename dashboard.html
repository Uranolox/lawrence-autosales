<!DOCTYPE html>

<html>

<head>

<title>Vehicle Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins,sans-serif;
background:#f5f9ff;
padding:40px;
}

.container{
max-width:1000px;
margin:auto;
}

.panel{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
margin-bottom:12px;
border:1px solid #ddd;
border-radius:10px;
box-sizing:border-box;
}

button{
background:#1565ff;
color:white;
border:none;
padding:14px 20px;
border-radius:10px;
cursor:pointer;
font-weight:700;
}

.vehicle{
background:white;
padding:15px;
margin-top:15px;
border-radius:15px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.vehicle img{
width:120px;
height:80px;
object-fit:cover;
border-radius:10px;
}

.delete{
background:red;
}

</style>

</head>

<body>

<div class="container">

<div class="panel">

<h2>Add Vehicle</h2>

<input id="title" placeholder="Vehicle Name">

<input id="price" placeholder="Price">

<input id="image" type="file">

<button id="addVehicle">

Add Vehicle

</button>

</div>

<div class="panel">

<h2>Inventory</h2>

<div id="vehicleList"></div>

</div>

</div>

<script type="module" src="dashboard.js"></script>

</body>

</html>
