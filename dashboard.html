<!DOCTYPE html>

<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vehicle Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins,sans-serif;
background:#f5f9ff;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
}

.panel{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
margin-bottom:25px;
}

input,
textarea{
width:100%;
padding:14px;
margin-bottom:12px;
border:1px solid #ddd;
border-radius:10px;
box-sizing:border-box;
font-size:16px;
}

textarea{
height:120px;
resize:vertical;
}

button{
background:#1565ff;
color:white;
border:none;
padding:16px;
border-radius:10px;
cursor:pointer;
font-weight:700;
font-size:16px;
width:100%;
}

.vehicle{
background:white;
padding:15px;
margin-top:15px;
border-radius:15px;
display:flex;
justify-content:space-between;
align-items:center;
gap:15px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.vehicle img{
width:140px;
height:90px;
object-fit:cover;
border-radius:10px;
}

.vehicle-info{
flex:1;
}

.vehicle-info h3{
margin-bottom:8px;
}

.vehicle-info p{
margin-bottom:5px;
}

.delete{
background:red;
width:auto;
padding:12px 18px;
}

@media(max-width:768px){

.vehicle{
flex-direction:column;
align-items:flex-start;
}

.vehicle img{
width:100%;
height:220px;
}

.delete{
width:100%;
margin-top:10px;
}

button{
min-height:60px;
font-size:18px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="panel">

<h2>Add Vehicle</h2>

<input id="year" placeholder="Year">

<input id="make" placeholder="Make">

<input id="model" placeholder="Model">

<input id="mileage" placeholder="Mileage">

<input id="price" placeholder="Price">

<textarea
id="description"
placeholder="Vehicle Description"></textarea>

<input
id="images"
type="file"
multiple
accept="image/*">

<button id="addVehicle">

Add Vehicle

</button>

</div>

<div class="panel">

<h2>Inventory</h2>

<div id="vehicleList"></div>

</div>

</div>

<script type="module" src="dashboard.js"></script>

</body>

</html>
