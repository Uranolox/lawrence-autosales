<!DOCTYPE html>

<html>
<style>

.gallery-container{
position:relative;
display:flex;
justify-content:center;
align-items:center;
}

#prevBtn,
#nextBtn{
position:absolute;
top:50%;
transform:translateY(-50%);
width:70px;
height:70px;
font-size:28px;
border:none;
border-radius:50%;
background:white;
font-size:24px;
font-weight:bold;
cursor:pointer;
box-shadow:0 5px 20px rgba(0,0,0,.15);
}

#prevBtn{
left:20px;
}

#nextBtn{
right:20px;
}

#dots{
display:flex;
justify-content:center;
gap:12px;
margin-top:20px;
}

.dot{
width:14px;
height:14px;
border-radius:50%;
background:#bbb;
cursor:pointer;
}

.dot.active{
background:white;
border:2px solid #1565ff;
}

</style>
