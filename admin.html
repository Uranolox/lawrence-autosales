<!DOCTYPE html>

<html>

<head>

<title>Lawrence Auto Sales Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins,sans-serif;
background:#1565ff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.login-box{
background:white;
padding:40px;
border-radius:20px;
width:400px;
box-shadow:0 20px 50px rgba(0,0,0,.2);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:10px;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
background:#1565ff;
color:white;
border:none;
border-radius:10px;
font-weight:700;
cursor:pointer;
}

#error{
color:red;
text-align:center;
margin-top:10px;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Admin Login</h2>

<input
id="email"
type="email"
placeholder="Email">

<input
id="password"
type="password"
placeholder="Password">

<button id="loginBtn">

Login

</button>

<div id="error"></div>

</div>

<script type="module">

import { auth }
from "./firebase.js";

import {
signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/11.9.1/firebase-auth.js";

const loginBtn =
document.getElementById("loginBtn");

loginBtn.addEventListener("click", async ()=>{

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

try{

await signInWithEmailAndPassword(
auth,
email,
password
);

window.location.href =
"dashboard.html";

}
catch(error){

document.getElementById("error")
.innerText =
error.message;

}

});

</script>

</body>
</html>
